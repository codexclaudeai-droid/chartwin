<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ChartWin Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #c9d1d9; min-height: 100vh; }
    .container { max-width: 760px; margin: 0 auto; padding: 32px 16px 64px; }
    h1 { font-size: 20px; font-weight: 700; color: #e6edf3; margin-bottom: 24px; }
    h1 span { color: #58a6ff; }
    .card { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 20px; margin-bottom: 16px; }
    .card-title { font-size: 11px; font-weight: 700; color: #8b949e; text-transform: uppercase; letter-spacing: .9px; margin-bottom: 14px; }
    .field-row { display: flex; gap: 8px; margin-bottom: 8px; }
    input[type="password"] {
      flex: 1; background: #0d1117; border: 1px solid #30363d; border-radius: 6px;
      color: #c9d1d9; font-size: 14px; padding: 8px 12px; outline: none; transition: border-color .15s;
    }
    input[type="password"]:focus { border-color: #58a6ff; }
    input[type="password"]::placeholder { color: #484f58; }
    button {
      background: #21262d; border: 1px solid #30363d; border-radius: 6px;
      color: #c9d1d9; font-size: 13px; font-weight: 600; padding: 8px 16px;
      cursor: pointer; white-space: nowrap; transition: background .15s, border-color .15s;
    }
    button:hover:not(:disabled) { background: #30363d; border-color: #8b949e; }
    button.primary { background: #238636; border-color: #2ea043; color: #fff; }
    button.primary:hover:not(:disabled) { background: #2ea043; }
    button.danger { background: #b91c1c; border-color: #dc2626; color: #fff; }
    button.danger:hover:not(:disabled) { background: #dc2626; }
    button:disabled { opacity: .4; cursor: not-allowed; }
    .status { font-size: 13px; padding: 9px 13px; border-radius: 6px; margin-top: 10px; display: none; }
    .status.ok  { background: #0d2b17; border: 1px solid #238636; color: #3fb950; display: block; }
    .status.err { background: #2b0d0d; border: 1px solid #da3633; color: #ff7b72; display: block; }
    .symbols-wrap { display: none; }
    .category { margin-bottom: 22px; }
    .category:last-child { margin-bottom: 0; }
    .category-label {
      font-size: 11px; font-weight: 700; color: #58a6ff; text-transform: uppercase;
      letter-spacing: .8px; margin-bottom: 10px; padding-bottom: 7px; border-bottom: 1px solid #21262d;
    }
    .col-headers {
      display: grid;
      gap: 8px;
      padding: 0 12px 6px;
      margin-bottom: 4px;
    }
    .col-hdr { font-size: 10px; font-weight: 700; color: #484f58; text-transform: uppercase; letter-spacing: .7px; text-align: center; }
    .col-hdr:first-child { text-align: left; }
    .symbol-grid { display: flex; flex-direction: column; gap: 6px; }
    .symbol-item {
      display: grid;
      align-items: center;
      gap: 8px;
      background: #0d1117; border: 1px solid #21262d; border-radius: 8px;
      padding: 9px 12px; transition: border-color .15s;
    }
    .symbol-item:hover { border-color: #30363d; }
    .sym-name { font-size: 13px; font-weight: 700; color: #e6edf3; }
    .sym-desc { font-size: 10px; color: #484f58; margin-top: 2px; }
    .toggle-col { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .toggle-state { font-size: 9px; font-weight: 700; letter-spacing: .4px; }
    .toggle { position: relative; width: 38px; height: 21px; }
    .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
    .track {
      position: absolute; inset: 0; border-radius: 21px; background: #3d4450;
      cursor: pointer; transition: background .2s;
    }
    .track::before {
      content: ''; position: absolute; width: 15px; height: 15px;
      top: 3px; left: 3px; border-radius: 50%; background: #8b949e;
      transition: transform .2s, background .2s;
    }
    .vis-input:checked + .track { background: #1a6330; }
    .vis-input:checked + .track::before { transform: translateX(17px); background: #3fb950; }
    .wh-input:checked + .track { background: #1a3366; }
    .wh-input:checked + .track::before { transform: translateX(17px); background: #58a6ff; }
    .toggle-state.on-vis  { color: #3fb950; }
    .toggle-state.off-vis { color: #484f58; }
    .toggle-state.on-wh   { color: #58a6ff; }
    .toggle-state.off-wh  { color: #484f58; }
    .strategy-radio {
      width: 16px;
      height: 16px;
      accent-color: #58a6ff;
      cursor: pointer;
    }
    .save-row { display: flex; align-items: center; gap: 12px; margin-top: 8px; }
    .summary { font-size: 13px; color: #8b949e; }
    .summary b { color: #ff7b72; }
    .summary span { color: #58a6ff; }
    .pw-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    @media (max-width: 480px) { .pw-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<div class="container">
  <h1>ChartWin <span>Admin</span></h1>

  <div class="card">
    <div class="card-title">관리자 인증</div>
    <div class="field-row">
      <input type="password" id="passphrase" placeholder="현재 Passphrase" autocomplete="current-password">
      <button id="load-btn" onclick="loadSettings()">불러오기</button>
    </div>
    <div class="status" id="auth-status"></div>
  </div>

  <div class="symbols-wrap" id="symbols-wrap">
    <div class="card">
      <div class="card-title">종목 관리</div>
      <div id="symbol-list"></div>
    </div>
    <div class="save-row">
      <button class="primary" id="save-btn" onclick="saveSettings()">변경사항 저장</button>
      <span class="summary" id="summary"></span>
    </div>
    <div class="status" id="save-status"></div>
  </div>

  <div class="symbols-wrap" id="strategy-wrap">
    <div class="card">
      <div class="card-title">전략 시그널 설정</div>
      <p style="font-size:12px;color:#8b949e;margin-bottom:14px;line-height:1.5;">
        개발자 화면에서만 사용할 전략 관리 버튼 노출 여부를 조정하고, 사용자용 메인 화면에 고정 표시할 전략을 선택합니다.
      </p>
      <div class="col-headers" id="strategy-col-headers" style="grid-template-columns:1fr 72px 82px;">
        <div class="col-hdr">전략</div>
        <div class="col-hdr">관리버튼</div>
        <div class="col-hdr">사용자용</div>
      </div>
      <div class="symbol-item" id="mgmt-global-row" style="grid-template-columns:1fr 72px 82px;margin-bottom:10px;">
        <div class="sym-info">
          <div class="sym-name">JS보기 / 수정 / 삭제 버튼</div>
          <div class="sym-desc">개발자 화면의 전략 설정 모달에서만 보이는 관리 버튼입니다.</div>
        </div>
        <div class="toggle-col">
          <label class="toggle">
            <input class="vis-input" type="checkbox" id="mgmt-global-toggle">
            <span class="track"></span>
          </label>
          <span class="toggle-state" id="mgmt-global-state">OFF</span>
        </div>
        <div class="toggle-col">
          <span class="toggle-state off-wh">고정</span>
        </div>
      </div>
      <div class="symbol-grid" id="strategy-list"></div>
    </div>
    <div class="save-row">
      <button class="primary" onclick="saveStrategies()">전략 설정 저장</button>
      <span class="summary" id="strategy-summary"></span>
    </div>
    <div class="status" id="strategy-status"></div>
  </div>

  <div class="symbols-wrap" id="pw-wrap">
    <div class="card">
      <div class="card-title">관리자 비밀번호 변경</div>
      <div class="pw-grid">
        <input type="password" id="new-pass" placeholder="새 비밀번호 (8자 이상)" autocomplete="new-password">
        <input type="password" id="new-pass-confirm" placeholder="새 비밀번호 확인" autocomplete="new-password">
      </div>
      <div class="field-row" style="margin-top:8px">
        <button class="danger" onclick="changePassword()">비밀번호 변경</button>
      </div>
      <div class="status" id="pw-status"></div>
    </div>
  </div>
</div>

<script>
const CATALOG = {
  'Index': {
    webhook: true,
    symbols: [
      { id: 'NQ1!', desc: 'E-mini Nasdaq-100 Futures' },
      { id: 'SPX500', desc: 'S&P 500' },
      { id: 'HSI', desc: 'Hang Seng' },
      { id: 'KOSPI', desc: 'Korea Composite Stock Price Index' },
      { id: 'KOSPI200', desc: 'KOSPI 200' },
      { id: 'KOSDAQ', desc: 'Korea Securities Dealers Automated Quotations' },
    ],
  },
  'Crypto Spot': {
    webhook: false,
    symbols: [
      { id: 'BTCUSDT', desc: 'Bitcoin / USDT' },
      { id: 'ETHUSDT', desc: 'Ethereum / USDT' },
      { id: 'SOLUSDT', desc: 'Solana / USDT' },
      { id: 'XRPUSDT', desc: 'XRP / USDT' },
      { id: 'BNBUSDT', desc: 'BNB / USDT' },
      { id: 'TRXUSDT', desc: 'TRX / USDT' },
    ],
  },
  'Crypto Futures': {
    webhook: false,
    symbols: [
      { id: 'BTCUSDT.P', desc: 'BTCUSDT Perpetual Futures' },
      { id: 'ETHUSDT.P', desc: 'ETHUSDT Perpetual Futures' },
      { id: 'XRPUSDT.P', desc: 'XRPUSDT Perpetual Futures' },
      { id: 'BNBUSDT.P', desc: 'BNBUSDT Perpetual Futures' },
      { id: 'SOLUSDT.P', desc: 'SOLUSDT Perpetual Futures' },
      { id: 'TRXUSDT.P', desc: 'TRXUSDT Perpetual Futures' },
    ],
  },
  'Commodity': {
    webhook: true,
    symbols: [
      { id: 'XAUUSD', desc: 'Gold / USD' },
      { id: 'WTI1!', desc: 'WTI Crude Oil Futures' },
      { id: 'XAGUSD', desc: 'Silver / USD' },
      { id: 'XAUUSDT.P', desc: 'Gold Perpetual Futures / USDT' },
      { id: 'XAGUSDT.P', desc: 'Silver Perpetual Futures / USDT' },
    ],
  },
};

const DEFAULT_STRATEGIES = [
  { id: 'strategy_js_sma_9_21', name: 'SMA 9/21 Cross (JS)', desc: 'Fast/slow SMA crossover signal' },
  { id: 'strategy_pine_sma_5_20', name: 'SMA 5/20 Cross (Pine)', desc: 'Pine input strategy compiled to JS' },
  { id: 'strategy_pine_bbands_directed', name: 'Bollinger Bands Directed (Pine)', desc: 'Bollinger breakout + trend-aware signals' },
  { id: 'strategy_js_double_break', name: 'Double Break Strategy (JS)', desc: 'BB upper/lower + Envelope upper/lower breakout' },
  { id: 'strategy_js_shayhuang_vwap_fast', name: 'ShayHuang_VWAP_Fast', desc: 'VWAP breakout with continuation filters' },
  { id: 'strategy_js_grid_martingale', name: 'Grid Martingale Scalping', desc: 'Grid martingale scalping strategy' },
  { id: 'strategy_js_grid_atr_bnf_srouter_v1', name: 'Grid+ATR+BNF+SRouter v1', desc: 'Adaptive grid strategy with ATR and regime routing' },
];

const DEFAULT_USER_STRATEGY_ID = 'strategy_js_grid_martingale';

let currentHidden = new Set();
let currentDisabled = new Set();
let currentHiddenStrategies = new Set();
let currentMgmtVisible = true;
let currentSelectedStrategyId = DEFAULT_USER_STRATEGY_ID;

function showStatus(id, type, msg) {
  const el = document.getElementById(id);
  el.className = 'status ' + type;
  el.textContent = msg;
}

function updateSummary() {
  const el = document.getElementById('summary');
  const hiddenCount = currentHidden.size;
  const disabledCount = currentDisabled.size;
  const parts = [];
  if (hiddenCount > 0) parts.push(`<b>${hiddenCount}개</b> 숨김`);
  if (disabledCount > 0) parts.push(`<span>${disabledCount}개</span> 웹훅 정지`);
  el.innerHTML = parts.length ? parts.join(' &nbsp;·&nbsp; ') : '모든 종목이 정상 노출 중입니다.';
}

function renderSymbols() {
  const list = document.getElementById('symbol-list');
  list.innerHTML = '';

  for (const [category, group] of Object.entries(CATALOG)) {
    const isWebhook = group.webhook;
    const categoryEl = document.createElement('div');
    categoryEl.className = 'category';
    categoryEl.innerHTML = `<div class="category-label">${category}${isWebhook ? ' <span style="color:#58a6ff;font-size:9px;font-weight:600;letter-spacing:.4px;vertical-align:middle">WEBHOOK</span>' : ''}</div>`;

    const headers = document.createElement('div');
    headers.className = 'col-headers';
    headers.style.gridTemplateColumns = isWebhook ? '1fr 72px 72px' : '1fr 72px';
    headers.innerHTML = `<div class="col-hdr">종목</div><div class="col-hdr">표시</div>${isWebhook ? '<div class="col-hdr">웹훅</div>' : ''}`;
    categoryEl.appendChild(headers);

    const grid = document.createElement('div');
    grid.className = 'symbol-grid';

    for (const symbol of group.symbols) {
      const id = symbol.id.toUpperCase();
      const visible = !currentHidden.has(id);
      const webhookEnabled = !currentDisabled.has(id);
      const uid = id.replace(/[^a-z0-9]/gi, '_');

      const item = document.createElement('div');
      item.className = 'symbol-item';
      item.style.gridTemplateColumns = isWebhook ? '1fr 72px 72px' : '1fr 72px';
      item.innerHTML = `
        <div class="sym-info">
          <div class="sym-name">${symbol.id}</div>
          <div class="sym-desc">${symbol.desc}</div>
        </div>
        <div class="toggle-col">
          <label class="toggle">
            <input class="vis-input" type="checkbox" data-id="${id}" ${visible ? 'checked' : ''}>
            <span class="track"></span>
          </label>
          <span class="toggle-state ${visible ? 'on-vis' : 'off-vis'}" id="vs_${uid}">${visible ? 'ON' : 'OFF'}</span>
        </div>
        ${isWebhook ? `
        <div class="toggle-col">
          <label class="toggle">
            <input class="wh-input" type="checkbox" data-id="${id}" ${webhookEnabled ? 'checked' : ''}>
            <span class="track"></span>
          </label>
          <span class="toggle-state ${webhookEnabled ? 'on-wh' : 'off-wh'}" id="wh_${uid}">${webhookEnabled ? 'ON' : 'OFF'}</span>
        </div>` : ''}`;

      item.querySelector('.vis-input').addEventListener('change', (event) => {
        const sid = event.target.dataset.id;
        const checked = event.target.checked;
        const stateEl = document.getElementById('vs_' + sid.replace(/[^a-z0-9]/gi, '_'));
        if (checked) {
          currentHidden.delete(sid);
          stateEl.textContent = 'ON';
          stateEl.className = 'toggle-state on-vis';
        } else {
          currentHidden.add(sid);
          stateEl.textContent = 'OFF';
          stateEl.className = 'toggle-state off-vis';
        }
        updateSummary();
      });

      if (isWebhook) {
        item.querySelector('.wh-input').addEventListener('change', (event) => {
          const sid = event.target.dataset.id;
          const checked = event.target.checked;
          const stateEl = document.getElementById('wh_' + sid.replace(/[^a-z0-9]/gi, '_'));
          if (checked) {
            currentDisabled.delete(sid);
            stateEl.textContent = 'ON';
            stateEl.className = 'toggle-state on-wh';
          } else {
            currentDisabled.add(sid);
            stateEl.textContent = 'OFF';
            stateEl.className = 'toggle-state off-wh';
          }
          updateSummary();
        });
      }

      grid.appendChild(item);
    }

    categoryEl.appendChild(grid);
    list.appendChild(categoryEl);
  }

  updateSummary();
}

function updateStrategySummary() {
  const el = document.getElementById('strategy-summary');
  const visibleCount = DEFAULT_STRATEGIES.length - currentHiddenStrategies.size;
  const selected = DEFAULT_STRATEGIES.find((strategy) => strategy.id === currentSelectedStrategyId);
  el.innerHTML = visibleCount > 0
    ? `<span>${visibleCount}개</span> 노출 / 사용자용 ${selected ? selected.name : DEFAULT_USER_STRATEGY_ID}`
    : '모든 전략이 숨김 상태입니다.';
}

function renderStrategyList() {
  const globalToggle = document.getElementById('mgmt-global-toggle');
  const globalState = document.getElementById('mgmt-global-state');
  globalToggle.checked = currentMgmtVisible;
  globalState.textContent = currentMgmtVisible ? 'ON' : 'OFF';
  globalState.className = 'toggle-state ' + (currentMgmtVisible ? 'on-vis' : 'off-vis');
  globalToggle.onchange = (event) => {
    currentMgmtVisible = event.target.checked;
    renderStrategyList();
  };

  const selectedVisible = DEFAULT_STRATEGIES.some((strategy) => (
    strategy.id === currentSelectedStrategyId && !currentHiddenStrategies.has(strategy.id)
  ));
  if (!selectedVisible) currentSelectedStrategyId = DEFAULT_USER_STRATEGY_ID;

  const list = document.getElementById('strategy-list');
  list.innerHTML = '';

  DEFAULT_STRATEGIES.forEach((strategy) => {
    const isVisible = !currentHiddenStrategies.has(strategy.id);
    const isSelected = currentSelectedStrategyId === strategy.id;
    const uid = strategy.id.replace(/[^a-z0-9]/gi, '_');

    const item = document.createElement('div');
    item.className = 'symbol-item';
    item.style.gridTemplateColumns = '1fr 72px 82px';
    item.innerHTML = `
      <div class="sym-info">
        <div class="sym-name">${strategy.name}</div>
        <div class="sym-desc">${strategy.desc}</div>
      </div>
      <div class="toggle-col">
        <label class="toggle">
          <input class="vis-input" type="checkbox" data-id="${strategy.id}" ${isVisible ? 'checked' : ''}>
          <span class="track"></span>
        </label>
        <span class="toggle-state ${isVisible ? 'on-vis' : 'off-vis'}" id="sv_${uid}">${isVisible ? 'ON' : 'OFF'}</span>
      </div>
      <div class="toggle-col">
        <label style="display:flex;align-items:center;justify-content:center;width:100%;cursor:${isVisible ? 'pointer' : 'not-allowed'};opacity:${isVisible ? '1' : '.45'};">
          <input class="strategy-radio" type="radio" name="selected-strategy" data-id="${strategy.id}" ${isSelected ? 'checked' : ''} ${isVisible ? '' : 'disabled'}>
        </label>
        <span class="toggle-state ${isSelected ? 'on-wh' : 'off-wh'}" id="ss_${uid}">${isSelected ? 'ON' : 'OFF'}</span>
      </div>
    `;

    item.querySelector('.vis-input').addEventListener('change', (event) => {
      const sid = event.target.dataset.id;
      const checked = event.target.checked;
      if (checked) currentHiddenStrategies.delete(sid);
      else currentHiddenStrategies.add(sid);
      if (currentHiddenStrategies.has(currentSelectedStrategyId)) currentSelectedStrategyId = DEFAULT_USER_STRATEGY_ID;
      renderStrategyList();
    });

    item.querySelector('.strategy-radio').addEventListener('change', (event) => {
      const sid = event.target.dataset.id;
      if (!sid || currentHiddenStrategies.has(sid)) return;
      currentSelectedStrategyId = sid;
      renderStrategyList();
    });

    list.appendChild(item);
  });

  updateStrategySummary();
}

async function loadStrategySettings() {
  try {
    const res = await fetch('/admin/strategies', { cache: 'no-store' });
    const json = await res.json();
    if (json.ok) {
      if (Array.isArray(json.hidden)) currentHiddenStrategies = new Set(json.hidden);
      if (typeof json.mgmtVisible === 'boolean') currentMgmtVisible = json.mgmtVisible;
      if (typeof json.selectedStrategyId === 'string' && json.selectedStrategyId) currentSelectedStrategyId = json.selectedStrategyId;
    }
  } catch {}
  renderStrategyList();
}

async function loadSettings() {
  const pass = document.getElementById('passphrase').value;
  if (!pass) {
    showStatus('auth-status', 'err', 'Passphrase를 입력해 주세요.');
    return;
  }
  document.getElementById('load-btn').disabled = true;
  try {
    const res = await fetch('/admin/symbols', { cache: 'no-store' });
    const json = await res.json();
    if (!json.ok) throw new Error(json.message || 'failed');
    currentHidden = new Set((json.hidden || []).map((symbol) => String(symbol).toUpperCase()));
    currentDisabled = new Set((json.disabled || []).map((symbol) => String(symbol).toUpperCase()));
    renderSymbols();
    await loadStrategySettings();
    document.getElementById('symbols-wrap').style.display = 'block';
    document.getElementById('strategy-wrap').style.display = 'block';
    document.getElementById('pw-wrap').style.display = 'block';
    showStatus('auth-status', 'ok', '설정을 불러왔습니다.');
  } catch (error) {
    showStatus('auth-status', 'err', '불러오기 실패: ' + error.message);
  } finally {
    document.getElementById('load-btn').disabled = false;
  }
}

async function saveSettings() {
  const pass = document.getElementById('passphrase').value;
  if (!pass) {
    showStatus('save-status', 'err', 'Passphrase를 입력해 주세요.');
    return;
  }
  const btn = document.getElementById('save-btn');
  btn.disabled = true;
  try {
    const res = await fetch('/admin/symbols', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({
        passphrase: pass,
        hidden: Array.from(currentHidden),
        disabled: Array.from(currentDisabled),
      }),
    });
    const json = await res.json();
    if (!json.ok) throw new Error(json.message || 'failed');
    showStatus('save-status', 'ok', `저장 완료 - 숨김 ${json.hidden.length}개 / 웹훅 정지 ${json.disabled.length}개`);
  } catch (error) {
    showStatus('save-status', 'err', '저장 실패: ' + error.message);
  } finally {
    btn.disabled = false;
  }
}

async function saveStrategies() {
  const pass = document.getElementById('passphrase').value;
  if (!pass) {
    showStatus('strategy-status', 'err', 'Passphrase를 입력해 주세요.');
    return;
  }
  if (currentHiddenStrategies.has(currentSelectedStrategyId)) {
    currentSelectedStrategyId = DEFAULT_USER_STRATEGY_ID;
  }
  try {
    const res = await fetch('/admin/strategies', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({
        passphrase: pass,
        hidden: Array.from(currentHiddenStrategies),
        mgmtVisible: currentMgmtVisible,
        selectedStrategyId: currentSelectedStrategyId,
      }),
    });
    const raw = await res.text();
    let json;
    try {
      json = JSON.parse(raw);
    } catch {
      throw new Error(`HTTP ${res.status} ${res.statusText || ''}`.trim());
    }
    if (!json.ok) throw new Error(json.message || 'failed');
    if (typeof json.selectedStrategyId === 'string' && json.selectedStrategyId) currentSelectedStrategyId = json.selectedStrategyId;
    renderStrategyList();
    showStatus('strategy-status', 'ok', `저장 완료 - 관리버튼 ${currentMgmtVisible ? 'ON' : 'OFF'} / 사용자용 ${currentSelectedStrategyId} / 숨김 ${json.hidden.length}개`);
  } catch (error) {
    showStatus('strategy-status', 'err', '저장 실패: ' + error.message);
  }
}

async function changePassword() {
  const pass = document.getElementById('passphrase').value;
  const next = document.getElementById('new-pass').value;
  const confirm = document.getElementById('new-pass-confirm').value;
  if (!pass) {
    showStatus('pw-status', 'err', '현재 Passphrase를 입력해 주세요.');
    return;
  }
  if (!next) {
    showStatus('pw-status', 'err', '새 비밀번호를 입력해 주세요.');
    return;
  }
  if (next.length < 8) {
    showStatus('pw-status', 'err', '새 비밀번호는 8자 이상이어야 합니다.');
    return;
  }
  if (next !== confirm) {
    showStatus('pw-status', 'err', '새 비밀번호가 일치하지 않습니다.');
    return;
  }
  try {
    const res = await fetch('/admin/passphrase', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ passphrase: pass, newPassphrase: next }),
    });
    const json = await res.json();
    if (!json.ok) throw new Error(json.message || 'failed');
    document.getElementById('passphrase').value = next;
    document.getElementById('new-pass').value = '';
    document.getElementById('new-pass-confirm').value = '';
    showStatus('pw-status', 'ok', '비밀번호가 변경되었습니다.');
  } catch (error) {
    showStatus('pw-status', 'err', '변경 실패: ' + error.message);
  }
}

document.getElementById('passphrase').addEventListener('keydown', (event) => {
  if (event.key === 'Enter') loadSettings();
});
</script>
